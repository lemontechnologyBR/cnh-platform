services:
  api:
    build:
      context: ./admin
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_FILE: /data/db.json
      JWT_SECRET: ${JWT_SECRET:-cnh_admin_secret_2026}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_WEBHOOK_URL: ${MP_WEBHOOK_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    volumes:
      - cnh-data:/data

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  cnh-data:
